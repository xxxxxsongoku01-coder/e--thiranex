<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORMA — Minimal Design Objects</title>
  <meta name="description" content="Curated collection of minimal design objects for the considered home." />
  <meta property="og:title" content="FORMA — Minimal Design Objects" />
  <meta property="og:description" content="Curated collection of minimal design objects for the considered home." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ─── NAVIGATION ─── -->
<nav id="nav">
  <a href="#/" class="nav-logo" data-link>FORMA</a>
  <div class="nav-links">
    <a href="#/catalog" data-link class="nav-link">Catalog</a>
    <a href="#/about" data-link class="nav-link">About</a>
  </div>
  <button class="cart-btn" id="cart-toggle" aria-label="Open cart">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<!-- ─── ROUTER VIEW ─── -->
<main id="app"></main>

<!-- ─── CART DRAWER ─── -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-drawer" id="cart-drawer" aria-label="Shopping cart">
  <div class="cart-header">
    <h2>Cart</h2>
    <button class="close-btn" id="cart-close" aria-label="Close cart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer"></div>
</aside>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="router.js"></script>
<script src="cart.js"></script>
<script src="app.js"></script>
</body>
</html>
